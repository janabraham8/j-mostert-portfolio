<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Preconnecting to Google Fonts servers to speed up typography rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Loading custom fonts: Space Grotesk for the layout, JetBrains Mono for terminal text -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Website</title>
  </head>
  <body>
    <!-- The injection point where React mounts your entire application -->
    <div id="root"></div>
    
    <!-- Directing the browser engine to load your application's entry script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
